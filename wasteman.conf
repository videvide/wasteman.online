# Supervisord config file
# Put this in /etc/supervisor/conf.d
# Create a env file (wasteman_env) and export variables
[program:wasteman]
user=admin
directory=/home/admin/wasteman.online/
command=/bin/bash -c "source /home/admin/wasteman_env && /home/admin/wasteman.online/.venv/bin/gunicorn -w 4 -b 127.0.0.1:1212 wasteman.wsgi:application"
autostart=true
autorestart=true
stdout_logfile=/home/admin/var/wasteman.log
stderr_logifle=/home/admin/var/wasteman.err.log 